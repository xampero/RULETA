<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta de Sorteos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f5f4;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #6b6b68;
      --color-border: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --purple: #7F77DD;
      --purple-dark: #534AB7;
      --purple-light: #EEEDFE;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-bg-secondary: #262624;
        --color-text-primary: #f0efeb;
        --color-text-secondary: #9a9a96;
        --color-border: rgba(255,255,255,0.1);
        --color-border-secondary: rgba(255,255,255,0.2);
        --purple-light: #26215C;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app { max-width: 900px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 26px; font-weight: 500; letter-spacing: -0.5px; }
    .header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--color-bg);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
    }

    .panel h2 {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--purple-light);
      color: var(--purple-dark);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      padding: 1px 8px;
      margin-left: 6px;
    }

    #nameInput {
      width: 100%;
      padding: 8px 10px;
      font-size: 15px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--radius-md);
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      font-family: inherit;
      margin-bottom: 8px;
      outline: none;
    }
    #nameInput:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(127,119,221,0.2);
    }

    .add-btn {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      font-weight: 500;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .add-btn:hover { background: var(--purple-dark); }
    .add-btn:active { transform: scale(0.98); }

    .participants {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 320px;
      overflow-y: auto;
    }

    .participant-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: var(--radius-md);
      font-size: 14px;
      color: white;
      font-weight: 500;
    }
    .participant-item button {
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .participant-item button:hover { background: rgba(255,255,255,0.4); }

    .empty-hint {
      font-size: 13px;
      color: var(--color-text-secondary);
      text-align: center;
      padding: 1rem 0;
      line-height: 1.6;
    }

    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .wheel-wrapper { position: relative; width: 100%; max-width: 420px; }
    .wheel-wrapper canvas { width: 100%; height: auto; display: block; border-radius: 50%; }

    .spin-btn {
      padding: 12px 48px;
      font-size: 16px;
      font-weight: 500;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
      font-family: inherit;
    }
    .spin-btn:hover:not(:disabled) { background: var(--purple-dark); }
    .spin-btn:active:not(:disabled) { transform: scale(0.97); }
    .spin-btn:disabled {
      background: var(--color-bg-secondary);
      color: var(--color-text-secondary);
      cursor: not-allowed;
      border: 0.5px solid var(--color-border);
    }

    .winner-banner {
      display: none;
      background: var(--color-bg);
      border: 2px solid var(--purple);
      border-radius: var(--radius-lg);
      padding: 1rem 1.5rem;
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .winner-banner.show { display: block; }
    .winner-banner .trophy { font-size: 32px; margin-bottom: 4px; }
    .winner-banner .winner-name { font-size: 22px; font-weight: 500; color: var(--purple-dark); margin-bottom: 4px; }
    .winner-banner .winner-sub { font-size: 13px; color: var(--color-text-secondary); }
    .winner-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
    .winner-actions button {
      padding: 6px 16px;
      font-size: 13px;
      border-radius: 99px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-keep {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border: 0.5px solid var(--color-border-secondary);
    }
    .btn-keep:hover { background: var(--color-bg); }
    .btn-remove { background: var(--purple); color: white; border: none; }
    .btn-remove:hover { background: var(--purple-dark); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Ruleta de sorteos</h1>
    <p>Agrega participantes, gira y deja que la suerte decida</p>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>Participantes <span class="count-badge" id="countBadge">0</span></h2>
      <input type="text" id="nameInput" placeholder="Nombre del participante..." maxlength="30" />
      <button class="add-btn" onclick="addParticipant()">+ Agregar</button>
      <div class="participants" id="participantList">
        <p class="empty-hint">Aún no hay participantes.<br>¡Agrega al menos 2!</p>
      </div>
    </div>

    <div class="wheel-section">
      <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spin()" disabled>Girar ruleta</button>
      <div class="winner-banner" id="winnerBanner">
        <div class="trophy">🏆</div>
        <div class="winner-name" id="winnerName"></div>
        <div class="winner-sub">¡Tenemos un ganador!</div>
        <div class="winner-actions">
          <button class="btn-keep" onclick="resetSpin()">Volver a girar</button>
          <button class="btn-remove" onclick="removeWinner()">Quitar del sorteo</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = [
  ['#7F77DD','#534AB7'],['#1D9E75','#0F6E56'],['#D85A30','#993C1D'],
  ['#D4537E','#993556'],['#378ADD','#185FA5'],['#639922','#3B6D11'],
  ['#BA7517','#854F0B'],['#E24B4A','#A32D2D'],['#888780','#5F5E5A'],
  ['#5DCAA5','#1D9E75']
];

let participants = [];
let spinning = false;
let currentAngle = 0;
let animFrame;
let winnerIndex = -1;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const W = 500, H = 500, CX = W/2, CY = H/2;

function addParticipant() {
  const inp = document.getElementById('nameInput');
  const name = inp.value.trim();
  if (!name) return;
  participants.push(name);
  inp.value = '';
  inp.focus();
  renderList();
  drawWheel();
  updateSpinBtn();
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addParticipant();
});

function removeParticipant(i) {
  participants.splice(i, 1);
  renderList();
  drawWheel();
  updateSpinBtn();
}

function renderList() {
  const list = document.getElementById('participantList');
  document.getElementById('countBadge').textContent = participants.length;
  if (participants.length === 0) {
    list.innerHTML = '<p class="empty-hint">Aún no hay participantes.<br>¡Agrega al menos 2!</p>';
    return;
  }
  list.innerHTML = participants.map((p, i) => {
    const [bg] = COLORS[i % COLORS.length];
    return `<div class="participant-item" style="background:${bg}">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${escHtml(p)}</span>
      <button onclick="removeParticipant(${i})">✕</button>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateSpinBtn() {
  document.getElementById('spinBtn').disabled = participants.length < 2 || spinning;
}

function drawWheel(angle) {
  angle = angle !== undefined ? angle : currentAngle;
  ctx.clearRect(0, 0, W, H);

  if (participants.length === 0) {
    ctx.save();
    ctx.fillStyle = '#EEEDFE';
    ctx.beginPath();
    ctx.arc(CX, CY, 230, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#534AB7';
    ctx.font = '500 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Agrega participantes', CX, CY - 12);
    ctx.fillText('para comenzar', CX, CY + 12);
    ctx.restore();
    drawPointer();
    return;
  }

  const n = participants.length;
  const arc = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const start = angle + i * arc - Math.PI / 2;
    const end = start + arc;
    const [light, dark] = COLORS[i % COLORS.length];

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, 230, start, end);
    ctx.closePath();
    ctx.fillStyle = i % 2 === 0 ? light : dark;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.font = `500 ${n > 10 ? 12 : 14}px sans-serif`;
    ctx.textBaseline = 'middle';
    const maxW = n > 8 ? 140 : 160;
    let label = participants[i];
    if (ctx.measureText(label).width > maxW) {
      while (ctx.measureText(label + '…').width > maxW && label.length > 0) label = label.slice(0, -1);
      label += '…';
    }
    ctx.fillText(label, 210, 0);
    ctx.restore();
  }

  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, 50, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.strokeStyle = 'rgba(127,119,221,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.font = '500 11px sans-serif';
  ctx.fillStyle = '#534AB7';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SORTEO', CX, CY);
  ctx.restore();

  drawPointer();
}

function drawPointer() {
  const px = CX, py = CY - 225;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(px - 12, py - 18);
  ctx.lineTo(px + 12, py - 18);
  ctx.lineTo(px, py + 8);
  ctx.closePath();
  ctx.fillStyle = '#534AB7';
  ctx.shadowColor = 'rgba(83,74,183,0.4)';
  ctx.shadowBlur = 6;
  ctx.fill();
  ctx.restore();
}

function spin() {
  if (spinning || participants.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('winnerBanner').classList.remove('show');

  const spins = 8 + Math.random() * 6;
  const extra = Math.random() * Math.PI * 2;
  const targetAngle = currentAngle + spins * Math.PI * 2 + extra;
  const duration = 5000;
  const startAngle = currentAngle;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) {
      animFrame = requestAnimationFrame(frame);
    } else {
      currentAngle = targetAngle;
      spinning = false;
      showWinner();
    }
  }

  animFrame = requestAnimationFrame(frame);
}

function showWinner() {
  const n = participants.length;
  const arc = (Math.PI * 2) / n;
  const normalized = ((currentAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const pointed = (Math.PI * 2 - normalized + Math.PI / 2) % (Math.PI * 2);
  winnerIndex = Math.floor(pointed / arc) % n;

  document.getElementById('winnerName').textContent = participants[winnerIndex];
  document.getElementById('winnerBanner').classList.add('show');
  document.getElementById('spinBtn').disabled = false;
}

function resetSpin() {
  document.getElementById('winnerBanner').classList.remove('show');
}

function removeWinner() {
  if (winnerIndex >= 0 && winnerIndex < participants.length) {
    participants.splice(winnerIndex, 1);
    winnerIndex = -1;
    renderList();
    drawWheel();
    updateSpinBtn();
  }
  document.getElementById('winnerBanner').classList.remove('show');
}

drawWheel();
renderList();
</script>
</body>
</html>
